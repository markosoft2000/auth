env: "local"
http_server:
  address: "0.0.0.0:8081"
  timeout: 3
  read_timeout: 5
  write_timeout: 10
  idle_timeout: 120
grpc:
  port: 50001
  timeout: 5s
token_ttl: 15m
refresh_token_ttl: 720h
master_secret: "master_secret"
hasher:
  memory: 65536
  iterations: 3
  parallelism: 2
  salt_length: 16
  key_length: 32
postgres:
  host: "db"
  port: 5432
  user: "postgres"
  password: "example"
  database: "auth_db"
  ssl_mode: "disable"
redis:
  host: "redis"
  port: 6379
caching:
  enabled: false
  app_ttl: 1m