services:
  db:
    image: postgres:14.7
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: auth_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

    # Master Nodes
  redis-1: &redis-node
    image: redis:7-alpine
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    #command: redis-server --maxmemory 400mb --maxmemory-policy allkeys-lru --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "7001:6379"
    volumes:
      - redis-1-data:/data

  redis-2:
    <<: *redis-node
    ports: ["7002:6379"]
    volumes: [redis-2-data:/data]

  redis-3:
    <<: *redis-node
    ports: ["7003:6379"]
    volumes: [redis-3-data:/data]

  # Replica Nodes
  redis-4:
    <<: *redis-node
    ports: ["7004:6379"]
    volumes: [redis-4-data:/data]

  redis-5:
    <<: *redis-node
    ports: ["7005:6379"]
    volumes: [redis-5-data:/data]

  redis-6:
    <<: *redis-node
    ports: ["7006:6379"]
    volumes: [redis-6-data:/data]

  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"

  # The "Joiner" service - runs once to create the cluster
  redis-cluster-creator:
    image: redis:7-alpine
    depends_on:
      - redis-1
      - redis-2
      - redis-3
      - redis-4
      - redis-5
      - redis-6
    command: >
      sh -c "
      sleep 3;
      # Check if redis-1 already knows about other nodes
      if redis-cli -h redis-1 cluster info | grep -q 'cluster_state:ok'; then
        echo 'Cluster already exists, skipping creation.';
        exit 0;
      else
        echo 'Creating new cluster...';
        echo 'yes' | redis-cli --cluster create 
        redis-1:6379 redis-2:6379 redis-3:6379 
        redis-4:6379 redis-5:6379 redis-6:6379 
        --cluster-replicas 1;
      fi
      "

  # One-time service to run migrations
  migrator:
    build: .
    environment:
      CONFIG_PATH: "./configs/local.yaml"
    command: ["./migrator", "up"]
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.50'    # Max 50% of a single CPU core
    #       memory: 512M   # Hard limit: container will be killed if it exceeds this
    #     reservations:
    #       cpus: '0.25'    # Guaranteed 25% of a CPU core
    #       memory: 256M   # Soft limit: Docker tries to keep usage here
    restart: always
    environment:
      CONFIG_PATH: "./configs/local.yaml"
    depends_on:
      db:
        condition: service_healthy
      redis-cluster-creator:
        condition: service_started
      migrator:
        condition: service_completed_successfully
    ports:
      - "50001:50001"
      - "8081:8081"

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"

volumes:
  pgdata:
  redis-1-data:
  redis-2-data:
  redis-3-data:
  redis-4-data:
  redis-5-data:
  redis-6-data: