services:
  db:
    image: postgres:14.7
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: auth_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

    # Master Nodes
  redis-1: &redis-node
    image: redis:7-alpine
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    #command: redis-server --maxmemory 400mb --maxmemory-policy allkeys-lru --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    restart: always
    command: 
      - redis-server
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "no"
      - --save
      - ""
      - --cluster-announce-ip
      - redis-1
    ports:
      - "7001:6379"
    volumes:
      - redis-1-data:/data

  redis-2:
    <<: *redis-node
    command: ["redis-server", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--appendonly", "no", "--save", "", "--cluster-announce-ip", "redis-2"]
    ports: ["7002:6379"]
    volumes: [redis-2-data:/data]

  redis-3:
    <<: *redis-node
    command: ["redis-server", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--appendonly", "no", "--save", "", "--cluster-announce-ip", "redis-3"]
    ports: ["7003:6379"]
    volumes: [redis-3-data:/data]

  # Replica Nodes
  redis-4:
    <<: *redis-node
    command: ["redis-server", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--appendonly", "no", "--save", "", "--cluster-announce-ip", "redis-4"]
    ports: ["7004:6379"]
    volumes: [redis-4-data:/data]

  redis-5:
    <<: *redis-node
    command: ["redis-server", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--appendonly", "no", "--save", "", "--cluster-announce-ip", "redis-5"]
    ports: ["7005:6379"]
    volumes: [redis-5-data:/data]

  redis-6:
    <<: *redis-node
    command: ["redis-server", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--appendonly", "no", "--save", "", "--cluster-announce-ip", "redis-6"]
    ports: ["7006:6379"]
    volumes: [redis-6-data:/data]

  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"

  # The "Joiner" service - runs once to create the cluster
  redis-cluster-creator:
    image: redis:7-alpine
    depends_on:
      - redis-1
      - redis-2
      - redis-3
      - redis-4
      - redis-5
      - redis-6
    command: >
      sh -c "
      sleep 3;
      if redis-cli -h redis-1 cluster info | grep -q 'cluster_state:ok'; then
        echo 'Cluster already exists, skipping creation.';
        exit 0;
      else
        echo 'Creating new cluster...';
        echo 'yes' | redis-cli --cluster create 
        redis-1:6379 redis-2:6379 redis-3:6379 
        redis-4:6379 redis-5:6379 redis-6:6379 
        --cluster-replicas 1;
      fi
      "

  kafka-1:
    image: confluentinc/cp-kafka:7.4.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-1:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka-1:29092,CONTROLLER://kafka-1:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      # Generate a cluster ID for KRaft
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka-1:29092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-2:
    image: confluentinc/cp-kafka:7.4.0
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-2:29092,PLAINTEXT_HOST://localhost:9093'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka-2:29092,CONTROLLER://kafka-2:29093,PLAINTEXT_HOST://0.0.0.0:9093'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3

  kafka-3:
    image: confluentinc/cp-kafka:7.4.0
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-3:29092,PLAINTEXT_HOST://localhost:9094'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka-3:29092,CONTROLLER://kafka-3:29093,PLAINTEXT_HOST://0.0.0.0:9094'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3

  kafka-setup:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      kafka-1:
        condition: service_healthy
    command: >
      sh -c "kafka-topics --create --if-not-exists --bootstrap-server kafka-1:29092 --partitions 3 --replication-factor 3 --topic auth-user-activity --config min.insync.replicas=2 --config retention.ms=1200000 --config segment.ms=1200000"
  # One-time service to run migrations
  migrator:
    build: .
    environment:
      CONFIG_PATH: "./configs/local.yaml"
    command: ["./migrator", "up"]
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.50'    # Max 50% of a single CPU core
    #       memory: 512M   # Hard limit: container will be killed if it exceeds this
    #     reservations:
    #       cpus: '0.25'    # Guaranteed 25% of a CPU core
    #       memory: 256M   # Soft limit: Docker tries to keep usage here
    restart: always
    environment:
      CONFIG_PATH: "./configs/local.yaml"
    depends_on:
      db:
        condition: service_healthy
      redis-cluster-creator:
        condition: service_completed_successfully
      migrator:
        condition: service_completed_successfully
      kafka-1:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully
    ports:
      - "50001:50001"
      - "8081:8081"

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"

volumes:
  pgdata:
  redis-1-data:
  redis-2-data:
  redis-3-data:
  redis-4-data:
  redis-5-data:
  redis-6-data: