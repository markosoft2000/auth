syntax = "proto3";

package auth;

option go_package = "markosoft2000.auth.v1;authv1";

service Auth {
  rpc Register (RegisterRequest) returns (RegisterResponse);
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc Logout (LogoutRequest) returns (LogoutResponse);
  rpc IsAdmin (IsAdminRequest) returns (IsAdminResponse);
  rpc RefreshToken (RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc AddApp (AddAppRequest) returns (AddAppResponse);
  rpc RemoveApp (RemoveAppRequest) returns (RemoveAppResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
}

message RegisterResponse {
  int64 user_id = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
  int32 app_id = 3;
  string ip = 4;
}

message LoginResponse {
  string access_token = 1; 
  string refresh_token = 2; 
}

message LogoutRequest {
  int64 user_id = 1;
  int32 app_id = 2;
  bool all_app = 3;
}

message LogoutResponse {

}

message IsAdminRequest {
  int64 user_id = 1;
}

message IsAdminResponse {
  bool is_admin = 1;
}

message RefreshTokenRequest {
  string refresh_token = 1;
  string ip = 2;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message AddAppRequest {
  string name =1;
  bytes secret = 2;
}

message AddAppResponse {
  int32 id = 1;
} 

message RemoveAppRequest {
  int32 id = 1;
}

message RemoveAppResponse {
  
} 