pools:
  - id: gRPC Load Pool
    gun:
      type: grpc_gun              # Ensure this matches register.Gun() precisely
      target: "localhost:50001"
    ammo:
      type: json_ammo
      source:                   # <-- Natively required structural nesting
        type: file              # <-- Data source type identification
        path: "./ammo.json"
    result:
      type: phout
      destination: ./phout.log
    rps:
      - duration: 10s
        type: line
        from: 1
        to: 8000
    startup:
      - type: once
        times: 1000
    discard_overflow: true  # True drops backed up ammo instances into 'discarded/777' locally